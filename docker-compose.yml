version: "3.9"

services:
  db:
    image: pgvector/pgvector:pg16
    container_name: chatvector-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    volumes:
      - chatvector-db-data:/var/lib/postgresql/data
      - ./backend/db/init:/docker-entrypoint-initdb.d
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 2s
      timeout: 2s
      retries: 10
      start_period: 5s

  redis:
    image: redis:7-alpine
    container_name: chatvector-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 2s
      retries: 10
    restart: unless-stopped

  api:
    build:
      context: ./backend
    container_name: chatvector-api
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8000:8000"
    environment:
      # 👇 Fixed: Using asyncpg for async support
      DATABASE_URL: "postgresql+asyncpg://postgres:postgres@db:5432/postgres"
      APP_ENV: "development"
      PYTHONPATH: /app
      REDIS_URL: "redis://redis:6379/0"
      # QUEUE_BACKEND defaults to "memory" — set to "redis" in backend/.env
      # to enable the Redis-backed durable queue
    working_dir: /app
    volumes:
      - ./backend:/app
    command:
      ["uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  tests:
    build:
      context: ./backend
    container_name: chatvector-tests
    working_dir: /app
    volumes:
      - ./backend:/app
    environment:
      # 👇 Same fix here
      DATABASE_URL: "postgresql+asyncpg://postgres:postgres@db:5432/postgres"
      APP_ENV: "test"
      PYTHONPATH: /app
    depends_on:
      db:
        condition: service_healthy
    command: ["pytest", "-v", "--asyncio-mode=auto"] # 👈 Added asyncio mode

volumes:
  chatvector-db-data:
